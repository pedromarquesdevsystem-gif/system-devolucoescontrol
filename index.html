<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#040f21" />
    <meta
      name="description"
      content="Nova Saúde - Controle de Devoluções entre lojas, compras e administração."
    />

    <title>Nova Saúde | Controle de Devoluções</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link

      <div

          display: grid;
          place-items: center;

          color: #f8fafc;
          font-family: Inter, Arial, sans-serif;
          text-align: center;
        "
      >
        <div>
          <h1 style="margin: 0 0 12px; font-size: 1.6rem;">JavaScript necessário</h1>

            filtros, modais e sincronização com o banco de dados.
          </p>
        </div>
      </div>
    </noscript>

    <div id="page-root" aria-live="polite"></div>
    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

    <script type="module" src="./js/app.js"></script>
